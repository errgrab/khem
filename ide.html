<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Khem IDE</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            rel="preconnect"
            href="https://fonts.gstatic.com"
            crossorigin=""
        />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500&family=Instrument+Serif:ital@0;1&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-tcl.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>

        <style>
            :root {
                --bg: #0a0a0a;
                --s0: #0e0e0e;
                --s1: #161616;
                --border: #272727;
                --b2: #333333;
                --fg: #d4d0c8;
                --fg2: #888888;
                --dim: #484848;
                --acc: #c8a84b;
                --mono: "DM Mono", monospace;
                --serif: "Instrument Serif", serif;
                --red: #a86b6b;
                --blue: #7a8fa8;
                --green: #6b9e78;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100vh;
                overflow: hidden;
                background: var(--bg);
                color: var(--fg);
                font-family: var(--mono);
                font-size: 13px;
            }

            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 12px 16px;
                border-bottom: 1px solid var(--border);
            }
            .logo {
                font-family: var(--serif);
                font-size: 24px;
            }

            .controls {
                display: flex;
                gap: 12px;
                align-items: center;
            }
            .btn {
                background: transparent;
                color: var(--fg);
                border: 1px solid var(--border);
                padding: 4px 16px;
                font-family: inherit;
                cursor: pointer;
                font-size: 11px;
                transition: 0.2s;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            .btn:hover {
                border-color: var(--fg2);
            }
            .btn-run {
                color: var(--acc);
                border-color: var(--acc);
            }
            .btn-run:hover {
                background: #c8a84b11;
                border-color: var(--acc);
            }

            .toggle-group {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 10px;
                color: var(--dim);
                text-transform: uppercase;
            }
            input[type="checkbox"] {
                accent-color: var(--acc);
                cursor: pointer;
            }

            main {
                display: flex;
                flex: 1;
                height: calc(100vh - 54px);
                gap: 1px;
                background: var(--border);
            }
            .col {
                display: flex;
                flex-direction: column;
                flex: 1;
                gap: 1px;
                min-width: 0;
            }

            .pane {
                background: var(--bg);
                position: relative;
                display: flex;
                flex-direction: column;
                min-height: 0;
            }
            .pane-app {
                flex: 3;
            }
            .pane-console {
                flex: 1;
            }
            .pane-preview {
                flex: 5;
            }
            .pane-html {
                flex: 3;
            }

            .pane-label {
                position: absolute;
                top: 8px;
                right: 12px;
                font-size: 9px;
                color: var(--dim);
                letter-spacing: 0.2em;
                text-transform: uppercase;
                z-index: 10;
                pointer-events: none;
            }
            .pane-action {
                position: absolute;
                top: 6px;
                left: 12px;
                font-size: 9px;
                color: var(--dim);
                cursor: pointer;
                z-index: 11;
                transition: 0.2s;
                border: none;
                background: none;
                text-decoration: underline;
            }
            .pane-action:hover {
                color: var(--fg2);
            }

            .editor-container {
                position: relative;
                flex: 1;
                background: var(--s1);
                overflow: hidden;
            }

            /* CRITICAL FIX: Ensure both layers have identical wrapping and scrolling */
            textarea,
            .highlight-wrap {
                position: absolute;
                inset: 0;
                padding: 32px 16px 16px 16px;
                border: none;
                font-family: var(--mono);
                font-size: 13px;
                line-height: 1.6;
                tab-size: 2;
                white-space: pre !important; /* Force no-wrap */
                overflow-wrap: normal !important; /* Force no-wrap */
                word-wrap: normal !important; /* Force no-wrap */
                overflow: auto;
            }
            textarea {
                color: transparent;
                background: transparent;
                caret-color: var(--fg);
                z-index: 2;
                outline: none;
                resize: none;
            }
            .highlight-wrap {
                z-index: 1;
                pointer-events: none;
                color: var(--fg);
                background: var(--s1);
            }
            code {
                font-family: inherit !important;
                display: block;
            }

            #console-out {
                flex: 1;
                background: var(--s0);
                color: var(--fg2);
                padding: 32px 16px 16px 16px;
                overflow-y: auto;
                font-size: 11px;
                white-space: pre-wrap;
            }
            .log-line {
                border-bottom: 1px solid var(--border);
                padding-bottom: 4px;
                margin-bottom: 4px;
                opacity: 0.8;
            }
            .sys-text {
                color: var(--blue);
            }
            .error-text {
                color: var(--red);
            }

            iframe {
                width: 100%;
                height: 100%;
                border: none;
                background: #fff;
            }

            /* Prism Theme Overrides for HTML highlighting */
            .token.tag {
                color: var(--acc);
            }
            .token.attr-name {
                color: var(--blue);
            }
            .token.attr-value {
                color: var(--green);
            }
            .token.string {
                color: var(--green);
            }
            .token.comment {
                color: var(--dim);
            }
        </style>
    </head>
    <body>
        <header>
            <div class="logo">khem</div>
            <div class="controls">
                <div class="toggle-group">
                    <input type="checkbox" id="auto-run-check" checked />
                    <label for="auto-run-check">Auto-Run</label>
                </div>
                <button class="btn btn-run" id="run-btn">Run Engine</button>
            </div>
        </header>

        <main>
            <div class="col">
                <div class="pane pane-app">
                    <div class="pane-label">APP.KH</div>
                    <div class="editor-container">
                        <textarea id="khem-in" spellcheck="false" wrap="off">
document "Live System" {
  div "main" {
    style { padding 40px; font-family sans-serif; } {
      h1 "" { text "Khem Engine" }
      p "" { text "Debugging the HTML wrap issue." }
      button {
        id "alert-btn"
        text "Trigger"
        js "alert('Compiled successfully!')"
      }
    }
  }
}</textarea
                        >
                        <pre
                            class="highlight-wrap language-tcl"
                        ><code id="khem-hl"></code></pre>
                    </div>
                </div>

                <div class="pane pane-console">
                    <div class="pane-label">CONSOLE</div>
                    <button class="pane-action" id="clear-console">
                        Clear
                    </button>
                    <div id="console-out"></div>
                </div>
            </div>

            <div class="col">
                <div class="pane pane-preview">
                    <div class="pane-label">DOM RENDER</div>
                    <div id="dom-out" style="flex: 1; background: #fff"></div>
                </div>

                <div class="pane pane-html">
                    <div class="pane-label">COMPILED HTML</div>
                    <div class="editor-container">
                        <textarea
                            id="html-out"
                            readonly
                            spellcheck="false"
                            wrap="off"
                        ></textarea>
                        <pre
                            class="highlight-wrap language-markup"
                        ><code id="html-hl"></code></pre>
                    </div>
                </div>
            </div>
        </main>

        <script type="module">
            import { createEnvironment, run } from "./src/index.js";

            const kIn = document.getElementById("khem-in"),
                kHl = document.getElementById("khem-hl");
            const hIn = document.getElementById("html-out"),
                hHl = document.getElementById("html-hl");
            const con = document.getElementById("console-out");
            const domOut = document.getElementById("dom-out");
            const autoCheck = document.getElementById("auto-run-check");

            let currentBlob = null;
            let autoRunTimer;

            // --- Core Sync Logic ---
            const sync = (codeElement, textarea) => {
                const pre = codeElement.parentElement;
                // HTML escaping for the highlight layer
                codeElement.innerHTML =
                    textarea.value
                        .replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;") + " \n";

                Prism.highlightElement(codeElement);

                // Ensure layers are scroll-locked
                pre.scrollTop = textarea.scrollTop;
                pre.scrollLeft = textarea.scrollLeft;
            };

            const log = (msg, type = "") => {
                const div = document.createElement("div");
                div.className = `log-line ${type ? type + "-text" : ""}`;
                div.textContent = `> ${msg}`;
                con.appendChild(div);
                con.scrollTop = con.scrollHeight;
            };

            // --- Compiler Execution ---
            const executeEngine = () => {
                try {
                    const env = createEnvironment();
                    let html = run(kIn.value, env);

                    if (html) {
                        // CHECK: If it doesn't look like a full HTML document, wrap it
                        if (
                            !html.trim().toLowerCase().startsWith("<!doctype")
                        ) {
                            html = wrapInDefaultStyles(html);
                        }

                        hIn.value = html;
                        sync(hHl, hIn);

                        if (currentBlob) URL.revokeObjectURL(currentBlob);
                        const blob = new Blob([html], { type: "text/html" });
                        currentBlob = URL.createObjectURL(blob);
                        domOut.innerHTML = `<iframe src="${currentBlob}"></iframe>`;

                        if (!autoCheck.checked) log("Build successful.", "sys");
                    }
                } catch (err) {
                    log(err.message, "error");
                }
            };

            const wrapInDefaultStyles = (content) => `
    <!DOCTYPE html>
    <html>
    <head>
      <link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Instrument+Serif&display=swap" rel="stylesheet">
      <style>
        :root {
          --bg: #0a0a0a; --s0: #101010; --s1: #161616; --surface: #141414; --border: #272727;
          --fg: #d4d0c8; --fg1: #aaaaaa; --fg2: #888888; --acc: #c8a84b;
          --mono: 'DM Mono', monospace; --serif: 'Instrument Serif', serif;
        }
        body {
          background: var(--bg); color: var(--fg);
          font-family: var(--mono); font-size: 12px; padding: 20px;
        }
        /* Include basic field/button styles so snippets work */
        button { background: transparent; border: 1px solid var(--border); color: var(--fg1); padding: 4px 12px; cursor: pointer; font-family: inherit; }
        .field { background: var(--bg); border: 1px solid var(--border); color: var(--fg); padding: 8px 10px; }
      </style>
    </head>
    <body>
      ${content}
    </body>
    </html>`;

            // --- Event Listeners ---
            // Sync editor scrolling
            const bindScroll = (textarea, highlight) => {
                textarea.addEventListener("scroll", () => {
                    highlight.parentElement.scrollTop = textarea.scrollTop;
                    highlight.parentElement.scrollLeft = textarea.scrollLeft;
                });
            };

            bindScroll(kIn, kHl);
            bindScroll(hIn, hHl); // Added scroll binding for HTML pane!

            kIn.addEventListener("input", () => {
                sync(kHl, kIn);
                if (autoCheck.checked) {
                    clearTimeout(autoRunTimer);
                    autoRunTimer = setTimeout(executeEngine, 800);
                }
            });

            // Support Tab key in main editor
            kIn.addEventListener("keydown", function (e) {
                if (e.key === "Tab") {
                    e.preventDefault();
                    const start = this.selectionStart,
                        end = this.selectionEnd;
                    this.value =
                        this.value.substring(0, start) +
                        "  " +
                        this.value.substring(end);
                    this.selectionStart = this.selectionEnd = start + 2;
                    sync(kHl, kIn);
                }
            });

            document.getElementById("run-btn").addEventListener("click", () => {
                log("Manual Build...", "sys");
                executeEngine();
            });

            document
                .getElementById("clear-console")
                .addEventListener("click", () => {
                    con.innerHTML = "";
                });

            // Global log capture
            console.log = (
                (orig) =>
                (...args) => {
                    orig(...args);
                    log(args.join(" "), "sys");
                }
            )(console.log);

            // Initial State
            sync(kHl, kIn);
            executeEngine();
        </script>
    </body>
</html>
