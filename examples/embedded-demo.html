<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khem Embedded Demo</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --s0: #101010;
      --s1: #161616;
      --border: #272727;
      --fg: #d4d0c8;
      --fg1: #aaaaaa;
      --acc: #c8a84b;
      --mono: 'DM Mono', 'Fira Mono', ui-monospace, monospace;
      --serif: 'Instrument Serif', Georgia, serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.6;
      padding: 40px;
    }
    h1, h2, h3 { font-family: var(--serif); font-weight: normal; }
    h1 { font-size: 32px; margin-bottom: 16px; }
    .card {
      background: var(--s1);
      border: 1px solid var(--border);
      padding: 16px;
      margin: 16px 0;
    }
    code { color: var(--acc); font-size: 10.5px; }
    button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg1);
      padding: 4px 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
      margin: 4px;
    }
    button:hover { border-color: var(--acc); color: var(--fg); }
  </style>
</head>
<body>
  <h1>Khem Embedded Demo</h1>
  
  <div class="card">
    <h2>Simple Math</h2>
    <script type="text/khem">
      p "" { text [concat "2 + 2 = " [expr 2 + 2]] }
      p "" { text [concat "10 * 5 = " [expr 10 * 5]] }
    </script>
  </div>

  <div class="card">
    <h2>List Processing</h2>
    <script type="text/khem">
      set fruits [list apple banana cherry date]
      p "" { text [concat "Number of fruits: " [llength $fruits]] }
      p "" { text [concat "First fruit: " [lindex $fruits 0]] }
      p "" { text [concat "Last fruit: " [lindex $fruits 3]] }
    </script>
  </div>

  <div class="card">
    <h2>String Operations</h2>
    <script type="text/khem">
      set msg "Hello, Khem!"
      p "" { text [concat "Original: " $msg] }
      p "" { text [concat "Uppercase: " [string toupper $msg]] }
      p "" { text [concat "Length: " [string length $msg]] }
    </script>
  </div>

  <div class="card">
    <h2>Pattern Matching</h2>
    <script type="text/khem">
      proc describe { num } {
        match $num {
          "1" { return "one" }
          "2" { return "two" }
          "3" { return "three" }
          default { return "many" }
        }
      }
      
      p "" { text [concat "1 is " [describe "1"]] }
      p "" { text [concat "2 is " [describe "2"]] }
      p "" { text [concat "5 is " [describe "5"]] }
    </script>
  </div>
</body>
</html>
