<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>:root {
  --bg: #0a0a0a;
  --s0: #101010;
  --s1: #161616;
  --s2: #1e1e1e;
  --s3: #262626;
  --border: #272727;
  --b2: #333333;
  --fg: #d4d0c8;
  --fg1: #aaaaaa;
  --fg2: #888888;
  --fg3: #555555;
  --dim: #484848;
  --acc: #c8a84b;
  --acc-dim: #7a6628;
  --green: #6b9e78;
  --green-dim: #2a4a33;
  --red: #a86b6b;
  --red-dim: #4a2222;
  --blue: #7a8fa8;
  --blue-dim: #2a3a4a;
  --amber: #d4924a;
  --mono: 'DM Mono', 'Fira Mono', ui-monospace, monospace;
  --serif: 'Instrument Serif', Georgia, serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4, h5, h6 {
  font-family: var(--mono);
  font-weight: 500;
  color: var(--fg);
}
p { color: var(--fg1); }
a { color: var(--acc); text-decoration: none; }
a:hover { text-decoration: underline; }
code { color: var(--acc); font-size: 10.5px; }
button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--fg2);
  padding: 6px 16px;
  cursor: pointer;
  font-family: inherit;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  transition: all 0.15s;
}
button:hover { border-color: var(--b2); color: var(--fg); }
input, textarea, select {
  background: var(--s1);
  border: 1px solid var(--border);
  color: var(--fg);
  padding: 8px 10px;
  font-family: inherit;
  font-size: 12px;
  outline: none;
  transition: all 0.15s;
}
input:focus, textarea:focus, select:focus { border-color: var(--acc); }
::placeholder { color: var(--fg3); }

</style>
</head>
<body>
  <div id="app"><div class="app"><h1 class="title">Hello, World!</h1><p class="subtitle">Built with Khem</p></div></div>
  <script>
    window.Khem = {
      state: {},
      routes: {"#/":"home"},
      pages: {"home":"style {\n    \".app\" {\n      display flex;\n      flex-direction column;\n      align-items center;\n      justify-content center;\n      min-height 100vh;\n      gap 16px;\n    }\n    \".title\" {\n      font-family var(--serif);\n      font-size 48px;\n      color var(--fg);\n    }\n    \".subtitle\" {\n      font-size 9.5px;\n      text-transform uppercase;\n      letter-spacing 0.18em;\n      color var(--fg3);\n    }\n  }\n\n  div \"app\" {\n    h1 \"title\" { text \"Hello, World!\" }\n    p \"subtitle\" { text \"Built with Khem\" }\n  }"},
      actions: {},
      
      set(key, value) {
        this.state[key] = String(value);
        this.render();
      },
      
      get(key) {
        return this.state[key] || "";
      },
      
      render() {
        // Re-render current page with new state
        const hash = window.location.hash || "#/";
        const pageName = this.routes[hash];
        if (!pageName || !this.pages[pageName]) return;
        
        const pageCode = this.pages[pageName];
        try {
          // Parse and evaluate with current state
          const commands = this.parse(pageCode);
          const html = this.evaluate(commands, this.state);
          document.getElementById("app").innerHTML = html;
          this.bindButtons();
        } catch (e) {
          console.error("Khem render error:", e);
        }
      },
      
      // Simple parser for client-side
      parse(code) {
        const cmds = [];
        let i = 0;
        const len = code.length;
        
        while (i < len) {
          while (i < len && /[ \t\r\n;]/.test(code[i])) i++;
          if (i >= len || code[i] === "#") break;
          
          if (code[i] === "#") {
            while (i < len && code[i] !== "\n") i++;
            continue;
          }
          
          const cmd = [];
          while (i < len) {
            while (i < len && /[ \t\r]/.test(code[i])) i++;
            if (i >= len || /[\n;]/.test(code[i])) break;
            
            if (code[i] === "{") {
              i++;
              let depth = 1, start = i;
              while (i < len && depth > 0) {
                if (code[i] === "{") depth++;
                if (code[i] === "}") { depth--; if (depth === 0) break; }
                i++;
              }
              cmd.push(code.slice(start, i).trim());
              if (i < len) i++;
              continue;
            }
            
            if (code[i] === "[") {
              i++;
              let depth = 1, start = i;
              while (i < len && depth > 0) {
                if (code[i] === "[") depth++;
                if (code[i] === "]") { depth--; if (depth === 0) break; }
                i++;
              }
              const inner = code.slice(start, i).trim();
              if (i < len) i++;
              if (inner) {
                cmd.push(this.evaluateSub(inner));
              }
              continue;
            }
            
            if (code[i] === '"') {
              i++;
              let value = "";
              while (i < len && code[i] !== '"') {
                if (code[i] === "\\" && i + 1 < len) { i++; value += code[i]; }
                else { value += code[i]; }
                i++;
              }
              if (i < len) i++;
              cmd.push(this.sub(value));
              continue;
            }
            
            let word = "";
            while (i < len && !/[ \t\r\n;\[\]{}"#]/.test(code[i])) {
              word += code[i];
              i++;
            }
            if (word) cmd.push(word);
          }
          
          if (cmd.length > 0) cmds.push(cmd);
        }
        return cmds;
      },
      
      sub(text) {
        if (typeof text !== "string") return text;
        return text.replace(/\$([a-zA-Z_][a-zA-Z0-9_-]*)/g, (m, name) => {
          return this.state[name] !== undefined ? this.state[name] : m;
        });
      },
      
      evaluateSub(expr) {
        try {
          // Handle [expr ...]
          const exprMatch = expr.match(/^expr\s+(.+)/);
          if (exprMatch) {
            const calcExpr = exprMatch[1].replace(/\$([a-zA-Z_][a-zA-Z0-9_-]*)/g, (m, name) => {
              return this.state[name] || "0";
            });
            return String(eval(calcExpr));
          }
          
          // Handle [concat ...]
          const concatMatch = expr.match(/^concat\s+(.+)/);
          if (concatMatch) {
            return this.sub(concatMatch[1]).replace(/"/g, "");
          }
          
          return this.sub(expr);
        } catch {
          return expr;
        }
      },
      
      evaluate(commands, state) {
        let output = "";
        for (const cmd of commands) {
          if (!Array.isArray(cmd) || cmd.length === 0) continue;
          
          const name = cmd[0];
          const args = cmd.slice(1);
          
          // HTML tag commands
          const htmlResult = this.htmlCommand(name, args, state);
          if (htmlResult !== null) {
            output += htmlResult;
            continue;
          }
          
          // set command
          if (name === "set" && args.length >= 2) {
            state[args[0]] = this.sub(args[1]);
            continue;
          }
        }
        return output;
      },
      
      htmlCommand(name, args, state) {
        const tags = ["div","span","p","h1","h2","h3","h4","h5","h6","ul","ol","li","table","tr","td","th","section","main","header","footer","nav","article","form","label","pre","code"];
        
        if (tags.includes(name)) {
          const cls = args[0] || "";
          const content = args[1] || "";
          const clsAttr = cls ? ' class="' + cls + '"' : "";
          let inner = this.sub(content);
          // Try to parse and evaluate inner content
          try {
            const innerCmds = this.parse(content);
            if (innerCmds.length > 0) {
              inner = this.evaluate(innerCmds, state);
            }
          } catch {}
          return "<" + name + clsAttr + ">" + inner + "</" + name + ">";
        }
        
        if (name === "text") {
          return this.sub(args[0] || "");
        }
        
        if (name === "button") {
          const cls = args[0] || "";
          const content = args[1] || "";
          const action = args[2];
          const clsAttr = cls ? ' class="' + cls + '"' : "";
          let inner = this.sub(content);
          try {
            const innerCmds = this.parse(content);
            if (innerCmds.length > 0) {
              inner = this.evaluate(innerCmds, state);
            }
          } catch {}
          
          // Store action for onclick
          if (action) {
            const actionId = "btn_" + Math.random().toString(36).slice(2, 8);
            this.actions[actionId] = action;
            return '<button' + clsAttr + ' onclick="window.khemExec(\'' + actionId + '\')">' + inner + '</button>';
          }
          
          return "<button" + clsAttr + ">" + inner + "</button>";
        }
        
        if (name === "a") {
          const href = args[0] || "#";
          const cls = args[1] || "";
          const content = args[2] || "";
          const clsAttr = cls ? ' class="' + cls + '"' : "";
          let inner = this.sub(content);
          try {
            const innerCmds = this.parse(content);
            if (innerCmds.length > 0) {
              inner = this.evaluate(innerCmds, state);
            }
          } catch {}
          return '<a href="' + this.sub(href) + '"' + clsAttr + '>' + inner + '</a>';
        }
        
        return null;
      },
      
      exec(actionId) {
        const action = this.actions[actionId];
        if (!action) return;
        
        // Parse action commands (simple set statements)
        for (const line of action.split("\n")) {
          const trimmed = line.trim();
          if (!trimmed) continue;
          
          // Handle "set name value"
          const setMatch = trimmed.match(/^set\s+(\S+)\s+(.+)$/);
          if (setMatch) {
            const name = setMatch[1];
            let value = setMatch[2];
            
            // Handle [expr ...]
            const exprMatch = value.match(/^\[expr\s+(.+)\]$/);
            if (exprMatch) {
              const calcExpr = exprMatch[1].replace(/\$([a-zA-Z_][a-zA-Z0-9_-]*)/g, (m, n) => {
                return this.state[n] || "0";
              });
              try {
                this.state[name] = String(eval(calcExpr));
              } catch {}
            } else {
              this.state[name] = this.sub(value.replace(/^"|"$/g, ""));
            }
          }
        }
        
        this.render();
      }
    };
    
    window.khemExec = (id) => window.Khem.exec(id);
    
    // Handle route changes
    window.addEventListener("hashchange", () => window.Khem.render());
    
    // Initial button binding
    window.Khem.render();
  </script>
</body>
</html>
