<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>:root {
  --bg: #0a0a0a; --s0: #101010; --s1: #161616; --s2: #1e1e1e; --s3: #262626;
  --border: #272727; --b2: #333333;
  --fg: #d4d0c8; --fg1: #aaaaaa; --fg2: #888888; --fg3: #555555; --dim: #484848;
  --acc: #c8a84b; --acc-dim: #7a6628;
  --green: #6b9e78; --green-dim: #2a4a33; --red: #a86b6b; --red-dim: #4a2222;
  --blue: #7a8fa8; --blue-dim: #2a3a4a; --amber: #d4924a;
  --mono: 'DM Mono', 'Fira Mono', ui-monospace, monospace;
  --serif: 'Instrument Serif', Georgia, serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  background: var(--bg); color: var(--fg); font-family: var(--mono);
  font-size: 12px; line-height: 1.6; -webkit-font-smoothing: antialiased;
  padding: 24px; min-height: 100vh; display: flex;
  justify-content: center; align-items: flex-start;
}
#app { width: 100%; max-width: 800px; }
h1, h2, h3 { font-family: var(--serif); font-weight: normal; }
p { color: var(--fg1); }
a { color: var(--acc); text-decoration: none; }
a:hover { text-decoration: underline; }
button {
  background: transparent; border: 1px solid var(--border); color: var(--fg2);
  padding: 4px 12px; cursor: pointer; font-family: inherit; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.08em; transition: all 0.15s;
}
button:hover { border-color: var(--b2); color: var(--fg); }
.field {
  background: var(--s1); border: 1px solid var(--border); color: var(--fg);
  padding: 8px 10px; font-family: inherit; font-size: 12px; outline: none;
}
.field:focus { border-color: var(--acc); }

.app {
    max-width 420px
    margin 40px auto
    display flex
    flex-direction column
    gap 20px
  }
  .header {
    display flex
    flex-direction column
    gap 2px
    padding-bottom 16px
    border-bottom 1px solid var(--border)
  }
  .logo {
    font-family var(--serif)
    font-size 28px
    color var(--fg)
  }
  .sub {
    font-size 9.5px
    text-transform uppercase
    letter-spacing 0.12em
    color var(--fg3)
  }
  .nav {
    display flex
    align-items center
    justify-content space-between
    gap 12px
  }
  .nav-btn {
    background var(--s1)
    border 1px solid var(--border)
    color var(--fg2)
    padding 6px 14px
    cursor pointer
    font-size 14px
    font-family inherit
    transition all 0.15s
  }
  .nav-btn:hover {
    background var(--s2)
    border-color var(--b2)
    color var(--fg)
  }
  .nav-label {
    font-family var(--serif)
    font-size 16px
    color var(--fg1)
  }
  .cal {
    border 1px solid var(--border)
    background var(--s0)
    overflow hidden
  }
  .weekdays {
    display grid
    grid-template-columns repeat(7, 1fr)
    border-bottom 1px solid var(--b2)
    background var(--s1)
  }
  .wd {
    text-align center
    padding 8px 4px
    font-size 8.5px
    text-transform uppercase
    letter-spacing 0.12em
    color var(--fg3)
  }
  .grid {
    display grid
    grid-template-columns repeat(7, 1fr)
    gap 1px
    background var(--border)
  }
  .cell {
    aspect-ratio 1
    display flex
    align-items center
    justify-content center
    font-size 11px
    cursor pointer
    transition all 0.12s
    background var(--s0)
    min-height 42px
    user-select none
  }
  .cell:hover {
    background var(--s2)
  }
  .cell-0 {
    color var(--fg3)
    font-size 10px
  }
  .cell-1 {
    background var(--green-dim)
    color var(--green)
    font-weight bold
    font-size 13px
  }
  .cell-1:hover { background #345e3d }
  .cell-2 {
    background var(--blue-dim)
    color var(--blue)
    font-weight bold
    font-size 13px
  }
  .cell-2:hover { background #354e63 }
  .cell-3 {
    background var(--red-dim)
    color var(--red)
    font-weight bold
    font-size 13px
  }
  .cell-3:hover { background #5a2e2e }
  .legend {
    display flex
    gap 20px
    justify-content center
    padding 12px 0 4px 0
  }
  .leg-item {
    display flex
    align-items center
    gap 6px
  }
  .leg-dot {
    width 10px
    height 10px
    border-radius 2px
    display inline-block
  }
  .leg-1 { background var(--green) }
  .leg-2 { background var(--blue) }
  .leg-3 { background var(--red) }
  .leg-text {
    font-size 9.5px
    color var(--fg2)
    letter-spacing 0.04em
  }
  .stats {
    display flex
    flex-direction column
    gap 6px
    padding 16px 0 0 0
    border-top 1px solid var(--border)
  }
  .stats-title {
    font-size 9.5px
    text-transform uppercase
    letter-spacing 0.12em
    color var(--dim)
    margin-bottom 4px
  }
  .stat-row {
    display flex
    justify-content space-between
    align-items baseline
    padding 4px 0
  }
  .stat-label {
    font-size 10px
    text-transform uppercase
    letter-spacing 0.08em
  }
  .stat-1 { color var(--green) }
  .stat-2 { color var(--blue) }
  .stat-3 { color var(--red) }
  .stat-value {
    font-family var(--serif)
    font-size 20px
    color var(--fg)
  }</style>
</head>
